<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranch Simulator World locations map - 兴趣区域, 支线任务与活动, 资源</title>
    <meta name="description" content="Find Ranch Simulator World 兴趣区域, 支线任务与活动, 资源 on a focused map page for long-tail searches. Includes 36 local markers." />
    <meta name="keywords" content="Ranch Simulator World locations, Ranch Simulator World resource map, Ranch Simulator World collectibles, Ranch Simulator World marker list" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" type="image/x-icon" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="map-body">
    <header class="map-topbar">
      <a class="brand" href="/" aria-label="Game Map Hub home"><img class="brand-logo" src="/logo.png" alt="Game Map Hub" /></a>
      <div class="map-title-block"><a href="/maps/ranch-simulator/">Ranch Simulator</a><strong>World</strong></div>
    </header>

    <main class="interactive-layout" data-page="map-detail" data-map-data="/data/ranch-simulator-world.json" data-tile-key="ranch-simulator/world" data-tile-zoom="6">
      <aside class="map-control-panel">
        <label class="map-search"><span>Search markers</span><input id="marker-search" type="search" placeholder="Search locations, items, resources..." /></label>
        <div class="marker-results" id="marker-results" aria-live="polite"></div>
        <div class="filter-actions" aria-label="Category filter actions"><button id="show-all-markers" type="button">Show all</button><button id="hide-all-markers" type="button">Hide all</button></div>
        <div class="category-list" id="category-list"></div>
      </aside>

      <section class="map-stage" aria-label="Ranch Simulator World location map">
        <div class="map-toolbar">
          <button class="icon-button" id="zoom-out" type="button" aria-label="Zoom out">-</button>
          <button class="icon-button" id="zoom-in" type="button" aria-label="Zoom in">+</button>
          <button class="ghost-button" id="reset-map" type="button">Reset</button>
          <span id="marker-count">Loading map...</span>
        </div>
        <div class="tile-viewport" id="tile-viewport"><canvas class="tile-canvas" id="tile-canvas" aria-hidden="true"></canvas><div class="tile-surface" id="tile-surface"></div></div>
        <article class="marker-detail" id="marker-detail"><span>Selected marker</span><strong>World</strong><p>Use search or category filters to find 兴趣区域, 支线任务与活动, 资源 on this Ranch Simulator map.</p></article>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
