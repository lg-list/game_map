<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Forest map locations list - The Peninsula</title>
    <meta name="description" content="The Forest map list for location searches. Open The Peninsula to find marker categories, collectibles, resources, and route details. The local pages include 694 markers." />
    <meta name="keywords" content="The Forest map list, The Forest locations map, The Forest collectibles map" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" type="image/x-icon" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Game Map Hub home"><img class="brand-logo" src="/logo.png" alt="Game Map Hub" /></a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="/">Games</a>
        <a href="/maps/the-forest/">The Forest</a>
        <a href="/maps/the-forest/the-forest/">Map</a>

      <div class="header-actions">
        <a href="/" class="account-link">Home</a>
        <a href="#library" class="download-button">Map List</a>
      </div>

    <main class="title-page" data-page="map-list">
      <section class="title-hero">
        <img src="/assets/images/games/the-forest/hero.webp" alt="The Forest map locations" />
        <div class="title-hero-copy">
          <p class="eyebrow">1 maps</p>

          <a class="download-button" href="/maps/the-forest/the-forest/">Open The Peninsula</a>
        </div>
      </section>

      <section class="library-section" id="library">
        <div class="section-heading"><p class="eyebrow">1 maps</p><h2>The Forest area maps</h2></div>
        <div class="map-list-grid" id="outbound-map-list" data-source="/data/the-forest.json" data-base-path="/maps/the-forest"></div>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
