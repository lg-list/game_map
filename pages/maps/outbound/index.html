<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outbound map locations list - The Outdoors and The Coast</title>
    <meta name="description" content="Outbound map list for location searches. Open The Outdoors, The Coast to find marker categories, collectibles, resources, and route details. The local pages include 644." />
    <meta name="keywords" content="Outbound map list, Outbound locations map, Outbound collectibles map" />
    <link rel="icon" href="/game_map/favicon.ico" sizes="32x32" type="image/x-icon" />
    <link rel="stylesheet" href="/game_map/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/game_map/" aria-label="Game Map Hub home"><img class="brand-logo" src="/game_map/logo.png" alt="Game Map Hub" /></a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="/game_map/">Games</a>
        <a href="/game_map/maps/outbound/">Outbound</a>
        <a href="/game_map/maps/outbound/the-outdoors/">Map</a>
      </nav>
      <div class="header-actions">
        <a href="/game_map/" class="account-link">Home</a>
        <a href="#library" class="download-button">Map List</a>
      </div>
    </header>

    <main class="title-page" data-page="map-list">
      <section class="title-hero">
        <img src="/game_map/assets/images/games/outbound/hero.webp" alt="Outbound map locations" />
        <div class="title-hero-copy">
          <p class="eyebrow">2 maps</p>
          <h1>Outbound map locations</h1>
          <p>Open a specific Outbound area map to browse marker categories, resource locations, collectibles, and route notes.</p>
          <a class="download-button" href="/game_map/maps/outbound/the-outdoors/">Open The Outdoors</a>
        </div>
      </section>

      <section class="library-section" id="library">
        <div class="section-heading"><p class="eyebrow">2 maps</p><h2>Outbound area maps</h2></div>
        <div class="map-list-grid" id="outbound-map-list" data-source="/game_map/data/outbound.json" data-base-path="/game_map/maps/outbound"></div>
      </section>
    </main>

    <script src="/game_map/script.js"></script>
  </body>
</html>
