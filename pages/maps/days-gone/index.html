<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Days Gone map locations list - World</title>
    <meta name="description" content="Days Gone map list for location searches. Open World to find marker categories, collectibles, resources, and route details. The local pages include 517 markers." />
    <meta name="keywords" content="Days Gone map list, Days Gone locations map, Days Gone collectibles map" />
    <link rel="icon" href="/game_map/favicon.ico" sizes="32x32" type="image/x-icon" />
    <link rel="stylesheet" href="/game_map/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/game_map/" aria-label="Game Map Hub home"><img class="brand-logo" src="/game_map/logo.png" alt="Game Map Hub" /></a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="/game_map/">Games</a>
        <a href="/game_map/maps/days-gone/">Days Gone</a>
        <a href="/game_map/maps/days-gone/world/">Map</a>
      </nav>
      <div class="header-actions">
        <a href="/game_map/" class="account-link">Home</a>
        <a href="#library" class="download-button">Map List</a>
      </div>
    </header>

    <main class="title-page" data-page="map-list">
      <section class="title-hero">
        <img src="/game_map/assets/images/games/days-gone/hero.webp" alt="Days Gone map locations" />
        <div class="title-hero-copy">
          <p class="eyebrow">1 maps</p>
          <h1>Days Gone map locations</h1>
          <p>Open a specific Days Gone area map to browse marker categories, resource locations, collectibles, and route notes.</p>
          <a class="download-button" href="/game_map/maps/days-gone/world/">Open World</a>
        </div>
      </section>

      <section class="library-section" id="library">
        <div class="section-heading"><p class="eyebrow">1 maps</p><h2>Days Gone area maps</h2></div>
        <div class="map-list-grid" id="outbound-map-list" data-source="/game_map/data/days-gone.json" data-base-path="/game_map/maps/days-gone"></div>
      </section>
    </main>

    <script src="/game_map/script.js"></script>
  </body>
</html>
